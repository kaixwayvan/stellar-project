[package]
name = "baonlock"
version = "0.1.0"
edition = "2021"

[dependencies]
soroban-sdk = { version = "20.3.0", default-features = false }

[dev-dependencies]
soroban-sdk = { version = "20.3.0", features = ["testutils"], default-features = false }

[lib]
crate-type = ["cdylib", "rlib"]

[profile.release]
# Change this temporarily for testing:
opt-level = "z"
lto = true
panic = "abort"  # Change from "abort" to "unwind" while debugging

[profile.dev]
panic = "unwind"

[profile.test]
panic = "unwind"

[patch.crates-io]
# This forces the version to 1.3.2 from the source, 
# which fixes the 'try_size_hint' compilation error.
arbitrary = { git = "https://github.com/rust-fuzz/arbitrary", tag = "v1.3.2" }